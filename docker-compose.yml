version: "3.8"

services:
  fastapi_database:
    image: postgres:15
    container_name: fastapi_database
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sheetflow
    volumes:
      - fastapi_database_data:/var/lib/postgresql/data
    ports:
      - "5477:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sheetflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  fast_api-sheetflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fast_api-sheetflow
    depends_on:
      fastapi_database:
        condition: service_healthy
    restart: always
    ports:
      - "8000:8000"
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://postgres:postgres@fastapi_database:5432/sheetflow
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,fast_api-sheetflow
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

volumes:
  fastapi_database_data:
